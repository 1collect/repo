{% extends "base.html" %}
{% block title %}Сканер — AssetChain{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Сканер штрихкода</h1>
    <div class="page-subtitle">Сканирование камерой, загрузка фото этикетки или ручной ввод кода.</div>
  </div>
</div>
<div class="card">
  <div class="card-body">
    <div class="scanner-shell">
      <video data-scanner-video playsinline muted></video>
      <div class="scanner-panel">
        <div class="alert alert-info" data-scanner-status>Нажмите «Запустить камеру» и наведите телефон на штрихкод.</div>
        <div class="d-flex flex-wrap gap-2">
          <button class="btn btn-primary" type="button" data-scanner-start><i class="fa-solid fa-camera me-1"></i>Запустить камеру</button>
          <button class="btn btn-light" type="button" data-scanner-stop><i class="fa-solid fa-stop me-1"></i>Остановить</button>
        </div>
        <form class="mt-3" method="post" enctype="multipart/form-data" action="{% url 'barcode_scanner_upload' %}">
          {% csrf_token %}
          <label class="form-label" for="barcodeImage">Фото этикетки</label>
          <div class="input-group">
            <input id="barcodeImage" class="form-control" type="file" name="image" accept="image/*" required>
            <button class="btn btn-primary" type="submit">Распознать</button>
          </div>
        </form>
        <form class="mt-3" action="{% url 'product_list' %}">
          <label class="form-label" for="manualBarcode">Штрихкод вручную</label>
          <div class="input-group">
            <input id="manualBarcode" class="form-control" name="q" inputmode="numeric" autocomplete="off">
            <button class="btn btn-primary">Найти</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
