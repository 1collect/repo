{% extends "base.html" %}
{% block title %}Вход — AssetChain{% endblock %}
{% block content %}
<div class="card auth-card">
  <div class="auth-logo">A</div>
  <h1 class="page-title mb-2">Добро пожаловать</h1>
  <p class="page-subtitle mb-4">Войдите в AssetChain для работы со складами и перемещениями.</p>
  <form method="post">
    {% csrf_token %}
    {% if form.errors %}<div class="alert alert-danger">Неверный логин или пароль.</div>{% endif %}
    <div class="mb-3"><label class="form-label">Логин</label><input class="form-control" name="username" autocomplete="username" autofocus required></div>
    <div class="mb-4"><label class="form-label">Пароль</label><input class="form-control" type="password" name="password" autocomplete="current-password" required></div>
    <button class="btn btn-primary w-100">Войти</button>
  </form>
</div>
{% endblock %}
